<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Wallet - Action Buttons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .wallet-buttons-container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            max-width: 420px;
            width: 100%;
        }

        .buttons-grid {
            display: flex;
            flex-direction: row;
            gap: 16px;
            justify-content: space-evenly;
            align-items: flex-start;
            flex-wrap: nowrap;
        }

        .button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
            max-width: 72px;
        }

        .action-button {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 12px 24px rgba(16, 185, 129, 0.4),
                0 4px 12px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            min-height: 44px;
            min-width: 44px;
        }

        .action-button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(16, 185, 129, 0.5),
                0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .action-button:active {
            transform: translateY(-1px) scale(0.98);
        }

        .action-button i {
            font-size: 1.4rem;
            z-index: 2;
            position: relative;
            color: white;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        /* Ripple effect */
        .action-button::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-button.ripple::before {
            width: 120px;
            height: 120px;
        }

        .button-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.15;
            max-width: 70px;
            white-space: normal;
            letter-spacing: 0.2px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            word-break: break-word;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .buttons-grid {
                gap: 12px;
            }
            .action-button {
                width: 64px;
                height: 64px;
            }
        }

        @media (min-width: 768px) {
            .wallet-buttons-container {
                max-width: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="wallet-buttons-container">
        <div class="buttons-grid">
            <div class="button-wrapper">
                <button class="action-button" data-action="send">
                    <i class="fas fa-paper-plane"></i>
                </button>
                <div class="button-label">Send</div>
            </div>
            <div class="button-wrapper">
                <button class="action-button" data-action="receive">
                    <i class="fas fa-download"></i>
                </button>
                <div class="button-label">Receive</div>
            </div>
            <div class="button-wrapper">
                <button class="action-button" data-action="buy">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="button-label">Buy</div>
            </div>
            <div class="button-wrapper">
                <button class="action-button" data-action="swap">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                <div class="button-label">Swap</div>
            </div>
            <div class="button-wrapper">
                <button class="action-button" data-action="convert">
                    <i class="fas fa-arrow-right-arrow-left"></i>
                </button>
                <div class="button-label">Convert</div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.action-button').forEach(button => {
            button.addEventListener('click', function(e) {
                // Ripple effect
                this.classList.add('ripple');
                setTimeout(() => this.classList.remove('ripple'), 600);
                
                // Action
                const action = this.dataset.action;
                console.log(`Action clicked: ${action.toUpperCase()}`);
                
                // Optional: Alert or modal
                // alert(`${action.toUpperCase()} tapped!`);
            });
            
            // Touch feedback
            button.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.95)';
            });
            
            button.addEventListener('touchend', function() {
                this.style.transform = '';
            });
        });
    </script>
</body>
</html>
